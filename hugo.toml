baseURL = "https://elkotito.github.io/"
locale = "en-us"
title = "Mateusz Pieniak"
description = "Mateusz Pieniak's Blog on AI, Machine Learning and Software Engineering"
theme = "PaperMod"
canonifyURLs = true
enableRobotsTXT = true

[params]
env = "production"
defaultTheme = "light"
author = "Mateusz Pieniak"
ShowReadingTime = true
ShowPostNavLinks = false
ShowShareButtons = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = true
fuse = true
math = true
keywords = ["AI", "Machine Learning", "Software Engineering", "Reinforcement Learning", "Deep Learning", "Python"]
homeInfoParams = { Title = "Mateusz Pieniak · AI & Machine Learning", Content = "Technical blog & notes on machine learning, reinforcement learning, deep learning, and AI engineering. From research ideas and mathematical intuition to working systems." }
assets = { customCSS = ["css/extended/custom.css"] }
socialIcons = [
    { name = "github", url = "https://github.com/elkotito" },
    { name = "linkedin", url = "https://linkedin.com/in/mateusz-pieniak/" },
    { name = "x", url = "https://x.com/MateuszPieniak" },
    { name = "rss", url = "/index.xml"}
]

[params.schema]
publisherType = "Person"

[menu]
main = [
    { name = "Posts", url = "/", weight = 1 },
    { identifier = "search", name = "Search", url = "/search/", weight = 2 },
    { name = "Tags", url = "/tags/", weight = 3 },
    { name = "RSS", url = "/index.xml", weight = 4 }
]

[outputs]
home = ["HTML", "RSS", "JSON"]

[sitemap]
changefreq = "weekly"
priority = 0.5

[services.googleAnalytics]
ID = "G-46M993T060"

[markup.goldmark.extensions.passthrough]
enable = true

[markup.goldmark.extensions.passthrough.delimiters]
block = [["$$", "$$"], ["\\[", "\\]"]]
inline = [["$", "$"], ["\\(", "\\)"]]
